<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese to Vietnamese Translator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #1a1a1a;
        }
        
        .header p {
            font-size: 14px;
            color: #666;
        }
        
        .translator-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .input-section,
        .output-section {
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            padding: 16px;
            display: flex;
            flex-direction: column;
        }
        
        .lang-label {
            font-size: 12px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        
        .input-section textarea {
            flex: 1;
            border: none;
            outline: none;
            font-family: inherit;
            font-size: 16px;
            resize: none;
            color: #333;
            min-height: 200px;
        }
        
        .input-section textarea::placeholder {
            color: #bbb;
        }
        
        .output-section {
            background: #f9f9f9;
            position: relative;
        }
        
        .output-text {
            flex: 1;
            font-size: 16px;
            color: #333;
            word-break: break-word;
            white-space: pre-wrap;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .output-text.empty {
            color: #ccc;
            font-size: 14px;
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        button {
            flex: 1;
            padding: 14px 20px;
            border: 1.5px solid #333;
            background: white;
            color: #333;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        button:hover {
            background: #f0f0f0;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button.primary {
            background: #333;
            color: white;
            border-color: #333;
        }
        
        button.primary:hover {
            background: #555;
        }
        
        .copy-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid #ddd;
            background: white;
            color: #666;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: none;
        }
        
        .copy-btn.show {
            display: block;
        }
        
        .copy-btn:hover {
            background: #f5f5f5;
            border-color: #bbb;
        }
        
        .info-box {
            background: #f0f0f0;
            padding: 16px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            line-height: 1.6;
            text-align: center;
        }
        
        .swap-btn {
            position: absolute;
            left: 50%;
            top: -40px;
            transform: translateX(-50%);
            width: 44px;
            height: 44px;
            border: 1.5px solid #333;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.2s ease;
        }
        
        .swap-btn:hover {
            background: #f0f0f0;
        }
        
        .swap-btn:active {
            transform: translateX(-50%) scale(0.95);
        }
        
        .translator-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        
        @media (max-width: 500px) {
            .header h1 {
                font-size: 24px;
            }
            
            .translator-box {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .input-section textarea,
            .output-text {
                min-height: 150px;
            }
            
            button {
                padding: 12px 16px;
                font-size: 14px;
            }
            
            .swap-btn {
                top: -32px;
                width: 40px;
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>翻译</h1>
            <p>Chinese to Vietnamese Translator</p>
        </div>
        
        <div class="translator-wrapper">
            <div class="translator-box">
                <div class="input-section">
                    <div class="lang-label">Chinese (简体中文)</div>
                    <textarea id="chineseInput" placeholder="Enter Chinese text..."></textarea>
                </div>
                
                <div class="output-section">
                    <div class="lang-label">Vietnamese (Tiếng Việt)</div>
                    <div class="output-text empty" id="output">
                        Output will appear here
                    </div>
                    <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">Copy</button>
                </div>
            </div>
            <button class="swap-btn" onclick="swapLanguages()" title="Swap languages">⇅</button>
        </div>
        
        <div class="button-group">
            <button class="primary" onclick="translateText()">Translate</button>
            <button onclick="clearAll()">Clear</button>
        </div>
        
        <div class="info-box">
            ⚡ Real-time translation powered by AI. Type or paste your text and click translate.
        </div>
    </div>
    
    <script>
        let currentLanguage = 'zh-to-vi'; // 'zh-to-vi' or 'vi-to-zh'
        
        const input = document.getElementById('chineseInput');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        
        input.addEventListener('input', () => {
            if (input.value.trim()) {
                copyBtn.classList.remove('show');
            }
        });
        
        async function translateText() {
            const text = input.value.trim();
            
            if (!text) {
                output.textContent = 'Please enter text to translate';
                output.classList.add('empty');
                copyBtn.classList.remove('show');
                return;
            }
            
            output.textContent = 'Translating...';
            output.classList.add('empty');
            copyBtn.classList.remove('show');
            
            try {
                const prompt = currentLanguage === 'zh-to-vi' 
                    ? `Translate the following Chinese text to Vietnamese. Provide only the translation, no explanations:\n\n${text}`
                    : `Translate the following Vietnamese text to Chinese (Simplified). Provide only the translation, no explanations:\n\n${text}`;
                
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [
                            { role: 'user', content: prompt }
                        ],
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();
                const translatedText = data.content[0].text.trim();
                
                output.textContent = translatedText;
                output.classList.remove('empty');
                copyBtn.classList.add('show');
                
            } catch (error) {
                output.textContent = 'Translation failed. Please try again.';
                output.classList.add('empty');
                console.error('Translation error:', error);
            }
        }
        
        function swapLanguages() {
            currentLanguage = currentLanguage === 'zh-to-vi' ? 'vi-to-zh' : 'zh-to-vi';
            
            const inputLabel = document.querySelector('.input-section .lang-label');
            const outputLabel = document.querySelector('.output-section .lang-label');
            const textarea = document.querySelector('textarea');
            
            if (currentLanguage === 'zh-to-vi') {
                inputLabel.textContent = 'Chinese (简体中文)';
                outputLabel.textContent = 'Vietnamese (Tiếng Việt)';
                textarea.placeholder = 'Enter Chinese text...';
            } else {
                inputLabel.textContent = 'Vietnamese (Tiếng Việt)';
                outputLabel.textContent = 'Chinese (简体中文)';
                textarea.placeholder = 'Enter Vietnamese text...';
            }
            
            [input.value, output.textContent] = [output.textContent, input.value];
            
            if (output.textContent === 'Output will appear here' || output.textContent === 'Translating...') {
                output.textContent = 'Output will appear here';
                output.classList.add('empty');
            } else {
                output.classList.remove('empty');
            }
            
            copyBtn.classList.remove('show');
        }
        
        function copyToClipboard() {
            const text = output.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const original = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = original;
                }, 2000);
            });
        }
        
        function clearAll() {
            input.value = '';
            output.textContent = 'Output will appear here';
            output.classList.add('empty');
            copyBtn.classList.remove('show');
        }
        
        // Allow Enter to translate
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                translateText();
            }
        });
    </script>
</body>
</html>
