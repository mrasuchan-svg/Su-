<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Su's Translator | 翻译</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400&display=swap');

        :root {
            --primary: #1a1a1a;
            --secondary: #666;
            --accent: #0066ff;
            --accent-light: #f0f7ff;
            --border: #e5e5e5;
            --bg: #ffffff;
            --bg-alt: #f9f9f9;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --primary: #ffffff;
                --secondary: #999;
                --accent: #4da6ff;
                --accent-light: #0a1929;
                --border: #333;
                --bg: #0d0d0d;
                --bg-alt: #1a1a1a;
            }
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--primary);
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 60px;
            margin-top: 40px;
        }

        .avatar {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            background: var(--accent-light);
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 600;
            color: var(--accent);
        }

        .header h1 {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header-subtitle {
            font-size: 14px;
            color: var(--secondary);
            margin-bottom: 4px;
        }

        .header-desc {
            font-size: 13px;
            color: var(--secondary);
            margin-top: 12px;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .translator-section {
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 32px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--secondary);
            margin-bottom: 24px;
        }

        .translator-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .input-box, .output-box {
            display: flex;
            flex-direction: column;
        }

        .lang-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 12px;
        }

        .input-box textarea {
            width: 100%;
            height: 220px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-family: 'Geist', inherit;
            font-size: 15px;
            color: var(--primary);
            background: var(--bg);
            resize: none;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-box textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .input-box textarea::placeholder {
            color: var(--secondary);
        }

        .output-box {
            position: relative;
        }

        .output-display {
            width: 100%;
            min-height: 220px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--bg);
            color: var(--primary);
            font-size: 15px;
            line-height: 1.6;
            word-break: break-word;
            white-space: pre-wrap;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .output-display.empty {
            color: var(--secondary);
            font-size: 14px;
        }

        .output-display.has-content {
            align-items: flex-start;
            justify-content: flex-start;
            text-align: left;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 8px 12px;
            font-size: 12px;
            font-weight: 500;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            opacity: 0;
            pointer-events: none;
        }

        .copy-btn.show {
            opacity: 1;
            pointer-events: auto;
        }

        .copy-btn:hover {
            background: #0052cc;
            transform: translateY(-1px);
        }

        .copy-btn:active {
            transform: translateY(0);
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: 1.5px solid var(--primary);
            background: transparent;
            color: var(--primary);
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Geist', inherit;
            flex: 1;
            min-width: 140px;
        }

        .btn:hover {
            background: var(--primary);
            color: var(--bg);
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .btn.primary:hover {
            background: #0052cc;
            border-color: #0052cc;
        }

        .swap-indicator {
            font-size: 13px;
            color: var(--secondary);
            text-align: center;
            margin-top: 16px;
        }

        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            padding: 0 0 32px 0;
        }

        .feature-card {
            padding: 20px;
            background: var(--bg-alt);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 12px;
        }

        .feature-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--primary);
        }

        .feature-desc {
            font-size: 12px;
            color: var(--secondary);
        }

        .footer {
            text-align: center;
            padding: 32px 0 20px;
            border-top: 1px solid var(--border);
            margin-top: 32px;
            font-size: 12px;
            color: var(--secondary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .header {
                margin-bottom: 40px;
                margin-top: 20px;
            }

            .avatar {
                width: 64px;
                height: 64px;
                font-size: 32px;
            }

            .header h1 {
                font-size: 24px;
            }

            .translator-section {
                padding: 24px;
                margin-bottom: 24px;
            }

            .translator-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .input-box textarea,
            .output-display {
                height: 180px;
            }

            .controls {
                flex-direction: column;
            }

            .btn {
                min-width: auto;
            }

            .features {
                grid-template-columns: 1fr;
                gap: 12px;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 20px;
            }

            .translator-section {
                padding: 16px;
                border-radius: 12px;
            }

            .input-box textarea,
            .output-display {
                font-size: 14px;
                padding: 12px;
                height: 150px;
            }

            .lang-label {
                font-size: 11px;
            }

            .avatar {
                width: 56px;
                height: 56px;
                font-size: 28px;
                margin-bottom: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="avatar">翻</div>
            <h1>Translator</h1>
            <p class="header-subtitle">Chinese ↔ Vietnamese</p>
            <p class="header-desc">Instant translation powered by AI</p>
        </div>

        <div class="main-content">
            <div class="translator-section">
                <h2 class="section-title">Translation Tool</h2>

                <div class="translator-grid">
                    <div class="input-box">
                        <label class="lang-label" id="srcLang">Chinese (简体中文)</label>
                        <textarea id="input" placeholder="Enter text to translate..."></textarea>
                    </div>

                    <div class="output-box">
                        <label class="lang-label" id="dstLang">Vietnamese (Tiếng Việt)</label>
                        <div class="output-display empty" id="output">
                            Output will appear here
                        </div>
                        <button class="copy-btn" id="copyBtn" onclick="copyToClipboard()">
                            Copy
                        </button>
                    </div>
                </div>

                <div class="controls">
                    <button class="btn primary" onclick="translateText()">Translate</button>
                    <button class="btn" onclick="swapLanguages()">⇅ Swap</button>
                    <button class="btn" onclick="clearAll()">Clear</button>
                </div>

                <div class="swap-indicator" id="indicator">
                    Chinese → Vietnamese
                </div>
            </div>

            <div class="features">
                <div class="feature-card">
                    <div class="feature-icon">⚡</div>
                    <div class="feature-title">Instant</div>
                    <div class="feature-desc">Real-time AI translation</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🎯</div>
                    <div class="feature-title">Accurate</div>
                    <div class="feature-desc">Context-aware results</div>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🔄</div>
                    <div class="feature-title">Bidirectional</div>
                    <div class="feature-desc">Swap languages anytime</div>
                </div>
            </div>
        </div>

        <div class="footer">
            Made with ❤ for translation | Powered by Claude AI
        </div>
    </div>

    <script>
        let mode = 'zh-to-vi';
        const input = document.getElementById('input');
        const output = document.getElementById('output');
        const copyBtn = document.getElementById('copyBtn');
        const srcLang = document.getElementById('srcLang');
        const dstLang = document.getElementById('dstLang');
        const indicator = document.getElementById('indicator');

        input.addEventListener('input', () => {
            if (input.value.trim()) {
                copyBtn.classList.remove('show');
            }
        });

        async function translateText() {
            const text = input.value.trim();

            if (!text) {
                output.textContent = 'Please enter text to translate';
                output.classList.add('empty');
                copyBtn.classList.remove('show');
                return;
            }

            output.textContent = 'Translating...';
            output.classList.add('empty');
            copyBtn.classList.remove('show');

            try {
                const prompt = mode === 'zh-to-vi'
                    ? `Translate this Chinese text to Vietnamese. Reply with only the translation:\n\n${text}`
                    : `Translate this Vietnamese text to Chinese (Simplified). Reply with only the translation:\n\n${text}`;

                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        model: 'claude-sonnet-4-20250514',
                        max_tokens: 1000,
                        messages: [
                            { role: 'user', content: prompt }
                        ],
                    })
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }

                const data = await response.json();
                const translated = data.content[0].text.trim();

                output.textContent = translated;
                output.classList.remove('empty');
                output.classList.add('has-content');
                copyBtn.classList.add('show');

            } catch (error) {
                output.textContent = 'Translation failed. Please try again.';
                output.classList.add('empty');
                console.error('Error:', error);
            }
        }

        function swapLanguages() {
            mode = mode === 'zh-to-vi' ? 'vi-to-zh' : 'zh-to-vi';

            if (mode === 'zh-to-vi') {
                srcLang.textContent = 'Chinese (简体中文)';
                dstLang.textContent = 'Vietnamese (Tiếng Việt)';
                input.placeholder = 'Enter Chinese text...';
                indicator.textContent = 'Chinese → Vietnamese';
            } else {
                srcLang.textContent = 'Vietnamese (Tiếng Việt)';
                dstLang.textContent = 'Chinese (简体中文)';
                input.placeholder = 'Enter Vietnamese text...';
                indicator.textContent = 'Vietnamese → Chinese';
            }

            [input.value, output.textContent] = [output.textContent, input.value];

            if (output.textContent === 'Output will appear here' || output.textContent === 'Translating...') {
                output.textContent = 'Output will appear here';
                output.classList.add('empty');
                output.classList.remove('has-content');
            }

            copyBtn.classList.remove('show');
        }

        function copyToClipboard() {
            navigator.clipboard.writeText(output.textContent).then(() => {
                const original = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = original;
                }, 1500);
            });
        }

        function clearAll() {
            input.value = '';
            output.textContent = 'Output will appear here';
            output.classList.add('empty');
            output.classList.remove('has-content');
            copyBtn.classList.remove('show');
        }

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.ctrlKey) {
                translateText();
            }
        });
    </script>
</body>
</html>
